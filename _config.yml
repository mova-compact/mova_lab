# Site settings
title: "MOVA Publishing Hub"
description: "Personal publishing hub for MOVA projects, articles, and stories"
url: "https://mova-compact.github.io"
baseurl: "/mova_blog"
author: "MOVA Team"
email: "contact@mova-compact.github.io"
default_lang: en
languages:
  - en
  - uk

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  story:
    output: true
    permalink: /story/:name/

# Front matter defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      status: published
      featured: false
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
      status: published
      featured: false
  - scope:
      path: ""
      type: "story"
    values:
      layout: story_chapter
      status: published
      featured: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - README.md
  - jekyll_tz_mova_hub.md

# Include files
include:
  - _pages